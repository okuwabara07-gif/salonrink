<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 640" width="320" height="640" role="img" aria-label="SalonRink スマホダッシュボード">
  <defs>
    <linearGradient id="phoneFrame" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2a3d5f"/>
      <stop offset="100%" stop-color="#1a2c4f"/>
    </linearGradient>
    <linearGradient id="screenBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#faf7f2"/>
      <stop offset="100%" stop-color="#fdfaf6"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FBEAF0"/>
      <stop offset="100%" stop-color="#f5b8b8" stop-opacity="0.6"/>
    </linearGradient>
    <linearGradient id="cardGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E8EEF5"/>
      <stop offset="100%" stop-color="#9DBDDB" stop-opacity="0.5"/>
    </linearGradient>
    <filter id="phoneShadow" x="-20%" y="-10%" width="140%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="14"/>
      <feOffset dx="0" dy="10"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.22"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- スマホ筐体 -->
  <g filter="url(#phoneShadow)">
    <rect x="10" y="10" width="300" height="620" rx="38" ry="38" fill="url(#phoneFrame)"/>
    <rect x="18" y="18" width="284" height="604" rx="32" ry="32" fill="url(#screenBg)"/>
  </g>

  <!-- ノッチ -->
  <rect x="125" y="22" width="70" height="20" rx="10" ry="10" fill="#1a2c4f"/>

  <!-- ステータスバー -->
  <text x="42" y="56" font-family="-apple-system, sans-serif" font-size="11" font-weight="600" fill="#1a2c4f">9:41</text>
  <g transform="translate(245, 48)">
    <path d="M 0 4 Q 6 0 12 4" stroke="#1a2c4f" stroke-width="1.5" fill="none"/>
    <path d="M 2 6 Q 6 3 10 6" stroke="#1a2c4f" stroke-width="1.5" fill="none"/>
    <circle cx="6" cy="8" r="1" fill="#1a2c4f"/>
    <rect x="20" y="3" width="20" height="8" rx="2" fill="none" stroke="#1a2c4f" stroke-width="1"/>
    <rect x="22" y="5" width="14" height="4" fill="#1a2c4f"/>
    <rect x="40" y="5" width="2" height="4" fill="#1a2c4f"/>
  </g>

  <!-- ヘッダー: Salon Lumière -->
  <g transform="translate(28, 78)">
    <text x="0" y="14" font-family="-apple-system, sans-serif" font-size="11" fill="#5a6878">こんにちは</text>
    <text x="0" y="34" font-family="Georgia, 'Times New Roman', serif" font-size="17" font-weight="700" fill="#1a2c4f" letter-spacing="0.3">Salon Lumière</text>
    <g transform="translate(238, 14)">
      <circle cx="10" cy="10" r="16" fill="#FBEAF0"/>
      <path d="M 10 5 C 7 5 5 7 5 10 L 5 13 L 4 14 L 16 14 L 15 13 L 15 10 C 15 7 13 5 10 5 Z" fill="#1a2c4f"/>
      <circle cx="14" cy="6" r="2.5" fill="#d88896"/>
    </g>
  </g>

  <!-- 本日のサマリーカード -->
  <g transform="translate(28, 130)">
    <rect width="264" height="84" rx="14" fill="url(#cardGrad)"/>
    <text x="14" y="22" font-family="-apple-system, sans-serif" font-size="10" font-weight="600" fill="#5a6878">本日の予約</text>
    <text x="14" y="56" font-family="-apple-system, sans-serif" font-size="32" font-weight="700" fill="#1a2c4f">8</text>
    <text x="48" y="56" font-family="-apple-system, sans-serif" font-size="13" fill="#5a6878">件</text>
    <text x="14" y="74" font-family="-apple-system, sans-serif" font-size="10" fill="#9ba8b8">前週比 +2件</text>
    <rect x="140" y="14" width="2" height="56" fill="#ffffff" opacity="0.6"/>
    <text x="156" y="22" font-family="-apple-system, sans-serif" font-size="10" font-weight="600" fill="#5a6878">本日の売上</text>
    <text x="156" y="56" font-family="-apple-system, sans-serif" font-size="20" font-weight="700" fill="#1a2c4f">¥86,400</text>
    <text x="156" y="74" font-family="-apple-system, sans-serif" font-size="10" fill="#9ba8b8">目標達成 96%</text>
  </g>

  <!-- 予約リストヘッダー -->
  <g transform="translate(28, 232)">
    <text x="0" y="14" font-family="-apple-system, sans-serif" font-size="13" font-weight="700" fill="#1a2c4f">直近の予約</text>
    <text x="232" y="14" font-family="-apple-system, sans-serif" font-size="10" fill="#d88896" text-anchor="end">すべて見る ›</text>
  </g>

  <!-- 予約カード1 -->
  <g transform="translate(28, 250)">
    <rect width="264" height="64" rx="12" fill="#ffffff" stroke="#f0e8df" stroke-width="1"/>
    <circle cx="32" cy="32" r="18" fill="#FBEAF0"/>
    <text x="32" y="37" font-family="-apple-system, sans-serif" font-size="14" font-weight="700" fill="#d88896" text-anchor="middle">M</text>
    <text x="60" y="22" font-family="-apple-system, sans-serif" font-size="12" font-weight="600" fill="#1a2c4f">松本 美咲 様</text>
    <text x="60" y="38" font-family="-apple-system, sans-serif" font-size="10" fill="#5a6878">カラー + カット ・ 山田</text>
    <rect x="60" y="44" width="50" height="14" rx="7" fill="#FBEAF0"/>
    <text x="85" y="54" font-family="-apple-system, sans-serif" font-size="9" font-weight="600" fill="#d88896" text-anchor="middle">14:00</text>
    <text x="248" y="38" font-family="-apple-system, sans-serif" font-size="10" font-weight="600" fill="#5a6878" text-anchor="end">¥12,800</text>
  </g>

  <!-- 予約カード2 -->
  <g transform="translate(28, 322)">
    <rect width="264" height="64" rx="12" fill="#ffffff" stroke="#f0e8df" stroke-width="1"/>
    <circle cx="32" cy="32" r="18" fill="#E8EEF5"/>
    <text x="32" y="37" font-family="-apple-system, sans-serif" font-size="14" font-weight="700" fill="#9DBDDB" text-anchor="middle">S</text>
    <text x="60" y="22" font-family="-apple-system, sans-serif" font-size="12" font-weight="600" fill="#1a2c4f">佐藤 結衣 様</text>
    <text x="60" y="38" font-family="-apple-system, sans-serif" font-size="10" fill="#5a6878">カット + トリートメント ・ 田中</text>
    <rect x="60" y="44" width="50" height="14" rx="7" fill="#E8EEF5"/>
    <text x="85" y="54" font-family="-apple-system, sans-serif" font-size="9" font-weight="600" fill="#9DBDDB" text-anchor="middle">15:30</text>
    <text x="248" y="38" font-family="-apple-system, sans-serif" font-size="10" font-weight="600" fill="#5a6878" text-anchor="end">¥8,400</text>
  </g>

  <!-- 予約カード3 -->
  <g transform="translate(28, 394)">
    <rect width="264" height="64" rx="12" fill="#ffffff" stroke="#f0e8df" stroke-width="1"/>
    <circle cx="32" cy="32" r="18" fill="#C8E6D4"/>
    <text x="32" y="37" font-family="-apple-system, sans-serif" font-size="14" font-weight="700" fill="#7AB89A" text-anchor="middle">A</text>
    <text x="60" y="22" font-family="-apple-system, sans-serif" font-size="12" font-weight="600" fill="#1a2c4f">青木 麻衣 様</text>
    <text x="60" y="38" font-family="-apple-system, sans-serif" font-size="10" fill="#5a6878">パーマ ・ 鈴木</text>
    <rect x="60" y="44" width="50" height="14" rx="7" fill="#C8E6D4"/>
    <text x="85" y="54" font-family="-apple-system, sans-serif" font-size="9" font-weight="600" fill="#7AB89A" text-anchor="middle">17:00</text>
    <text x="248" y="38" font-family="-apple-system, sans-serif" font-size="10" font-weight="600" fill="#5a6878" text-anchor="end">¥14,200</text>
  </g>

  <!-- クイックアクション -->
  <g transform="translate(28, 478)">
    <rect width="264" height="60" rx="12" fill="url(#cardGrad2)" opacity="0.7"/>
    <text x="14" y="22" font-family="-apple-system, sans-serif" font-size="10" font-weight="600" fill="#5a6878">クイックアクション</text>
    <rect x="14" y="30" width="74" height="22" rx="11" fill="#ffffff"/>
    <text x="51" y="44" font-family="-apple-system, sans-serif" font-size="9" font-weight="600" fill="#1a2c4f" text-anchor="middle">+ 新規予約</text>
    <rect x="94" y="30" width="74" height="22" rx="11" fill="#ffffff"/>
    <text x="131" y="44" font-family="-apple-system, sans-serif" font-size="9" font-weight="600" fill="#1a2c4f" text-anchor="middle">カルテ</text>
    <rect x="174" y="30" width="74" height="22" rx="11" fill="#ffffff"/>
    <text x="211" y="44" font-family="-apple-system, sans-serif" font-size="9" font-weight="600" fill="#1a2c4f" text-anchor="middle">LINE通知</text>
  </g>

  <!-- 下部タブバー(5項目) -->
  <g transform="translate(18, 558)">
    <rect width="284" height="64" rx="0" fill="#ffffff"/>
    <rect width="284" height="1" fill="#f0e8df"/>
    
    <g transform="translate(0, 8)">
      <path d="M 28 18 L 36 12 L 44 18 L 44 28 L 28 28 Z" fill="#d88896"/>
      <text x="36" y="44" font-family="-apple-system, sans-serif" font-size="8" font-weight="600" fill="#d88896" text-anchor="middle">ホーム</text>
    </g>
    <g transform="translate(57, 8)">
      <rect x="28" y="14" width="16" height="14" rx="2" fill="none" stroke="#9ba8b8" stroke-width="1.5"/>
      <line x1="28" y1="20" x2="44" y2="20" stroke="#9ba8b8" stroke-width="1.5"/>
      <text x="36" y="44" font-family="-apple-system, sans-serif" font-size="8" fill="#9ba8b8" text-anchor="middle">予約</text>
    </g>
    <g transform="translate(114, 8)">
      <circle cx="36" cy="18" r="4" fill="none" stroke="#9ba8b8" stroke-width="1.5"/>
      <path d="M 28 30 Q 36 22 44 30" fill="none" stroke="#9ba8b8" stroke-width="1.5"/>
      <text x="36" y="44" font-family="-apple-system, sans-serif" font-size="8" fill="#9ba8b8" text-anchor="middle">顧客</text>
    </g>
    <g transform="translate(171, 8)">
      <circle cx="32" cy="20" r="3.5" fill="none" stroke="#9ba8b8" stroke-width="1.5"/>
      <circle cx="40" cy="20" r="3.5" fill="none" stroke="#9ba8b8" stroke-width="1.5"/>
      <text x="36" y="44" font-family="-apple-system, sans-serif" font-size="8" fill="#9ba8b8" text-anchor="middle">連携</text>
    </g>
    <g transform="translate(228, 8)">
      <circle cx="30" cy="20" r="1.5" fill="#9ba8b8"/>
      <circle cx="36" cy="20" r="1.5" fill="#9ba8b8"/>
      <circle cx="42" cy="20" r="1.5" fill="#9ba8b8"/>
      <text x="36" y="44" font-family="-apple-system, sans-serif" font-size="8" fill="#9ba8b8" text-anchor="middle">その他</text>
    </g>
  </g>

  <rect x="125" y="618" width="70" height="4" rx="2" fill="#1a2c4f" opacity="0.4"/>
</svg>
