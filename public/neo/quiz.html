<!DOCTYPE html>
<html lang="ja">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>SalonRink 診断</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@600;700&family=Zen+Kaku+Gothic+New:wght@400;500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="salonrink-neo.css">
<link rel="stylesheet" href="salonrink-neo-page.css">
<style>
  .sr.sr-page { display: flex; flex-direction: column; padding-bottom: 40px; }
  .dx-screen { flex: 1; }
  .qz-progress { display: flex; gap: 6px; justify-content: center; margin: 6px 0 18px; }
  .qz-dot { width: 8px; height: 8px; border-radius: 50%; background: #E3DCD3; transition: .2s; }
  .qz-dot.on { background: var(--sr-grad, #C24E40); transform: scale(1.15); }
  .qz-qno { font-size: 12px; font-weight: 900; color: var(--sr-accent-ink, #93482F); letter-spacing: .06em; }
  .qz-qtitle { font-size: 20px; font-weight: 900; line-height: 1.5; margin: 8px 0 20px; color: var(--sr-ink, #2F3833); }
  .qz-opts { display: grid; gap: 11px; }
  .qz-opt { width: 100%; text-align: left; font-family: inherit; font-size: 15px; font-weight: 700; color: var(--sr-ink, #2F3833);
    background: #FEFEFD; border: none; border-radius: 14px; padding: 16px 18px; cursor: pointer;
    box-shadow: 0 6px 14px var(--neo-dark, rgba(180,150,120,.18)); transition: transform .12s, box-shadow .12s; }
  .qz-opt:active { transform: scale(.985); }
  .qz-opt:hover { box-shadow: 0 8px 18px var(--neo-dark, rgba(180,150,120,.26)); }
  .qz-back { margin-top: 18px; background: none; border: none; color: var(--sr-muted, #9A938B); font-size: 13px; font-weight: 700; cursor: pointer; font-family: inherit; }
  .qz-loading { text-align: center; padding: 60px 0; }
  .qz-spin { width: 40px; height: 40px; margin: 0 auto 18px; border-radius: 50%; border: 3px solid #EEE7DE; border-top-color: var(--sr-grad, #C24E40); animation: qzspin 1s linear infinite; }
  @keyframes qzspin { to { transform: rotate(360deg); } }
  .qz-rtype { font-size: 23px; font-weight: 900; color: var(--sr-ink, #2F3833); margin: 4px 0 8px; }
  .qz-rcopy { font-size: 13.5px; line-height: 1.8; color: var(--sr-muted, #66716A); margin-bottom: 18px; }
  .qz-bar-row { display: flex; align-items: center; gap: 10px; margin: 9px 0; }
  .qz-bar-label { flex: 0 0 70px; font-size: 13px; color: #66716A; }
  .qz-bar-track { flex: 1; height: 10px; background: #E8EAE6; border-radius: 5px; overflow: hidden; }
  .qz-bar-fill { height: 100%; border-radius: 5px; background: #5E9270; }
  .qz-bar-val { flex: 0 0 28px; text-align: right; font-size: 12px; color: #3F6B50; font-weight: 700; }
  .qz-reco { margin: 18px 0 4px; font-size: 13px; }
  .qz-reco strong { color: var(--sr-ink, #2F3833); }
  .qz-gate { margin-top: 26px; padding: 20px 18px; border-radius: 18px; background: #FBF7F3; text-align: center; }
  .gate-title { font-size: 13px; font-weight: 900; color: var(--sr-accent-ink, #93482F); letter-spacing: .04em; }
  .gate-lead { font-size: 12.5px; color: var(--sr-muted, #66716A); line-height: 1.7; margin: 8px 0 14px; }
  .px-code { font-family: 'Caveat', cursive; font-weight: 700; font-size: 38px; letter-spacing: 6px; color: var(--sr-ink, #2F3833); background: #FEFEFD; border-radius: 12px; padding: 8px 4px; box-shadow: 0 6px 14px var(--neo-dark, rgba(180,150,120,.18)); }
  .gate-steps { text-align: left; font-size: 12.5px; color: #4A554E; line-height: 1.9; margin: 14px 0; padding-left: 1.2em; }
  #qzError { display: none; margin: 14px 0 0; padding: 12px 14px; border-radius: 12px; background: #FBEDEA; color: #93482F; font-size: 13px; line-height: 1.6; }
</style>
</head>
<body>
<div class="sr sr-page" id="app" data-screen-label="AI診断">

  <p class="liff-note" id="liffNote">無料・登録なしでお試しいただけます</p>

  <header class="sr-header" style="justify-content: center;">
    <img class="sr-logo" src="assets/logo.png" alt="SalonRink" onerror="this.style.display='none'">
  </header>

  <!-- イントロ -->
  <section class="dx-screen dx-intro on" id="scrIntro">
    <div><span class="dx-badge" id="introBadge">AI診断</span></div>
    <h1 id="introTitle">質問にこたえて、<br>あなたのタイプを。</h1>
    <p id="introLead">いくつかの質問から、傾向とケアの目安をお届けします。</p>
    <div class="dx-meta"><span id="introMeta">約1分</span><span>無料</span></div>
    <button class="sr-btn sr-btn-line sr-btn-lg" id="startBtn">無料で診断する</button>
    <p class="sr-note" style="text-align:center;">※回答にもとづく「傾向」とケアの目安です。<br>結果はイメージであり、状態・効果を保証するものではありません。</p>
  </section>

  <!-- 質問 -->
  <section class="dx-screen" id="scrQuiz">
    <div class="qz-progress" id="qzProgress"></div>
    <span class="qz-qno" id="qzNo">Q1</span>
    <h2 class="qz-qtitle" id="qzTitle"></h2>
    <div class="qz-opts" id="qzOpts"></div>
    <button class="qz-back" id="qzBack">‹ もどる</button>
  </section>

  <!-- ローディング -->
  <section class="dx-screen" id="scrLoading">
    <div class="qz-loading"><div class="qz-spin"></div><p>結果を分析しています…</p></div>
  </section>

  <!-- 結果 -->
  <section class="dx-screen" id="scrResult"></section>

</div>

<script>
(function () {
  'use strict';

  var QUIZ_ENDPOINT = "https://fmpmgilgvvfezursmyic.supabase.co/functions/v1/quiz-diagnose";
  var LINE_ADD = "https://lin.ee/O6Zh4et";                 // ヘアカルテ 友だち追加
  var OA_BASIC = "%40287lupjm";                            // ヘアカルテ @287lupjm
  var DEEPLINK = function (code) { return "https://line.me/R/oaMessage/" + OA_BASIC + "/?" + encodeURIComponent(code || ""); };

  var KIND_META = {
    hair_quality: { badge: "髪質診断", title: "6つの質問で、<br>あなたの髪質タイプを。", lead: "クセ・太さ・ダメージ・広がりの傾向を、ケアの目安とともに。", meta: "約1分" },
    scalp:        { badge: "頭皮・スカルプ診断", title: "6つの質問で、<br>頭皮環境の傾向を。", lead: "乾燥・皮脂・敏感さ・血行の傾向を、ケアの目安とともに。", meta: "約1分" },
    beauty_dna:   { badge: "Beauty DNA 診断", title: "8つの質問で、<br>あなたの美容タイプを。", lead: "ツヤ・うるおい・エイジングケア・トレンド・ナチュラルを総合分析。", meta: "約2分" }
  };

  var QUESTIONS = {
    hair_quality: [
      { q: "髪は広がりやすいですか？", opts: ["まとまりやすい", "ふつう", "広がりやすい", "かなり広がる"] },
      { q: "髪の太さは？", opts: ["細い", "ふつう", "太い"] },
      { q: "カラーやパーマの頻度は？", opts: ["ほとんどしない", "ときどき", "繰り返している"] },
      { q: "雨・湿気の日のうねりは？", opts: ["気にならない", "少しうねる", "かなりうねる"] },
      { q: "毛先の乾燥・パサつきは？", opts: ["しっとり", "ふつう", "乾燥ぎみ", "かなり乾燥"] },
      { q: "シャンプー後の指通りは？", opts: ["なめらか", "ふつう", "きしむ"] }
    ],
    scalp: [
      { q: "頭皮の乾燥・かゆみは？", opts: ["気にならない", "ときどき", "よくある"] },
      { q: "夕方の頭皮のベタつきは？", opts: ["少ない", "ふつう", "多い"] },
      { q: "フケは気になりますか？", opts: ["ない", "少し", "気になる"] },
      { q: "頭皮の敏感さ（しみる等）は？", opts: ["平気", "ときどき", "敏感"] },
      { q: "頭皮のコリ・かたさは？", opts: ["やわらかい", "ふつう", "かたい"] },
      { q: "抜け毛・ボリュームの変化は？", opts: ["気にならない", "少し気になる", "気になる"] }
    ],
    beauty_dna: [
      { q: "なりたい髪の印象は？", opts: ["ツヤ重視", "うるおい重視", "エイジングケア", "トレンド", "ナチュラル"] },
      { q: "普段のスタイリング時間は？", opts: ["ほぼかけない", "5分以内", "しっかりかける"] },
      { q: "ヘアケアへの関心は？", opts: ["低め", "ふつう", "高い"] },
      { q: "白髪・年齢サインは気になる？", opts: ["気にならない", "少し", "気になる"] },
      { q: "新色・新スタイルへの関心は？", opts: ["低い", "ふつう", "高い"] },
      { q: "自然体 vs 作り込み、どっち？", opts: ["自然体", "バランス", "しっかり作る"] },
      { q: "髪の悩みで一番は？", opts: ["ツヤ不足", "パサつき", "ハリコシ", "クセ・広がり", "特になし"] },
      { q: "サロンに求めるものは？", opts: ["仕上がりの美しさ", "スタイルの持ち", "癒し", "トレンド提案"] }
    ]
  };

  function byId(id) { return document.getElementById(id); }
  function esc(s) { return String(s == null ? '' : s).replace(/[&<>"]/g, function (c) { return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]; }); }

  // kind 取得
  var KIND = (function () {
    var k = new URLSearchParams(location.search).get('kind') || 'hair_quality';
    return QUESTIONS[k] ? k : 'hair_quality';
  })();
  var QS = QUESTIONS[KIND];
  var META = KIND_META[KIND];

  // セッションID（photo.html と共通キー）
  var SR_SID = (function () {
    try { var v = localStorage.getItem('sr_sid'); if (!v) { v = (window.crypto && crypto.randomUUID) ? crypto.randomUUID() : (String(Date.now()) + Math.random().toString(16).slice(2)); localStorage.setItem('sr_sid', v); } return v; }
    catch (e) { return String(Date.now()); }
  })();

  var state = { idx: 0, answers: [] };

  function show(id) {
    ['scrIntro', 'scrQuiz', 'scrLoading', 'scrResult'].forEach(function (s) { byId(s).classList.toggle('on', s === id); });
    window.scrollTo(0, 0);
  }

  // イントロ初期化
  byId('introBadge').textContent = META.badge;
  byId('introTitle').innerHTML = META.title;
  byId('introLead').textContent = META.lead;
  byId('introMeta').textContent = META.meta;
  document.title = "SalonRink " + META.badge;

  function renderProgress() {
    var html = '';
    for (var i = 0; i < QS.length; i++) html += '<span class="qz-dot' + (i <= state.idx ? ' on' : '') + '"></span>';
    byId('qzProgress').innerHTML = html;
  }

  function renderQuestion() {
    var item = QS[state.idx];
    byId('qzNo').textContent = 'Q' + (state.idx + 1) + ' / ' + QS.length;
    byId('qzTitle').textContent = item.q;
    var opts = item.opts.map(function (o) {
      return '<button class="qz-opt" data-val="' + esc(o) + '">' + esc(o) + '</button>';
    }).join('');
    byId('qzOpts').innerHTML = opts;
    byId('qzBack').style.visibility = state.idx === 0 ? 'hidden' : 'visible';
    renderProgress();
  }

  byId('qzOpts').addEventListener('click', function (e) {
    var b = e.target.closest('.qz-opt'); if (!b) return;
    state.answers[state.idx] = b.getAttribute('data-val');
    if (state.idx < QS.length - 1) { state.idx++; renderQuestion(); }
    else submit();
  });
  byId('qzBack').addEventListener('click', function () {
    if (state.idx > 0) { state.idx--; renderQuestion(); }
  });
  byId('startBtn').addEventListener('click', function () { state.idx = 0; state.answers = []; show('scrQuiz'); renderQuestion(); });

  function submit() {
    show('scrLoading');
    fetch(QUIZ_ENDPOINT, {
      method: 'POST',
      headers: { 'content-type': 'application/json' },
      body: JSON.stringify({ kind: KIND, answers: state.answers, session_id: SR_SID })
    }).then(function (r) { return r.json(); }).then(function (data) {
      if (!data || !data.ok || !data.result) throw new Error((data && data.message) || 'failed');
      renderResult(data.result, data.share_code);
    }).catch(function (err) {
      renderError(String(err && err.message || err));
    });
  }

  function bars(scores) {
    return Object.keys(scores).map(function (k) {
      var v = Math.max(0, Math.min(100, Math.round(Number(scores[k]) || 0)));
      return '<div class="qz-bar-row"><span class="qz-bar-label">' + esc(k) + '</span>' +
        '<span class="qz-bar-track"><span class="qz-bar-fill" style="width:' + v + '%"></span></span>' +
        '<span class="qz-bar-val">' + v + '</span></div>';
    }).join('');
  }

  function renderResult(result, code) {
    var reco = Array.isArray(result.recommend) ? result.recommend.join(' / ') : (result.recommend || '');
    var html =
      '<div><span class="dx-badge">' + esc(result.label || META.badge) + '</span></div>' +
      '<div class="qz-rtype">' + esc(result.type_name || 'あなたのタイプ') + '</div>' +
      (result.type_copy ? '<p class="qz-rcopy">' + esc(result.type_copy) + '</p>' : '') +
      bars(result.scores || {}) +
      (reco ? '<p class="qz-reco"><strong>おすすめケア：</strong>' + esc(reco) + '</p>' : '') +
      '<div class="qz-gate">' +
        '<div class="gate-title">詳しい結果とカルテをLINEで受け取る</div>' +
        '<p class="gate-lead">下の6桁コードを「SalonRink ヘアカルテ」に送ると、結果が保存され、いつでも見返せます。</p>' +
        '<div class="px-code" id="shareCode">' + esc(code || '------') + '</div>' +
        '<ol class="gate-steps">' +
          '<li>「① ヘアカルテを友だち追加」をタップ</li>' +
          '<li>「② 結果を受け取る」をタップ（コードが自動入力されます）</li>' +
          '<li>送信すると、詳しい結果が届きます</li>' +
        '</ol>' +
        '<a class="sr-btn sr-btn-ghost sr-btn-lg" href="' + LINE_ADD + '" target="_blank" rel="noreferrer">① ヘアカルテを友だち追加</a>' +
        '<a class="sr-btn sr-btn-line sr-btn-lg" style="margin-top:12px;" href="' + DEEPLINK(code) + '" target="_blank" rel="noreferrer">② 結果を受け取る（タップで送信）</a>' +
      '</div>' +
      '<button class="qz-back" id="againBtn" style="display:block;margin:20px auto 0;">もう一度診断する</button>';
    byId('scrResult').innerHTML = html;
    show('scrResult');
    var again = byId('againBtn');
    if (again) again.addEventListener('click', function () { state.idx = 0; state.answers = []; show('scrIntro'); });
  }

  function renderError(msg) {
    byId('scrResult').innerHTML =
      '<div id="qzError" style="display:block;">うまく分析できませんでした。少し時間をおいて、もう一度お試しください。<br><span style="font-size:11px;color:#B79;">' + esc(msg) + '</span></div>' +
      '<button class="sr-btn sr-btn-line sr-btn-lg" style="margin-top:18px;" id="retryBtn">もう一度ためす</button>';
    show('scrResult');
    var rb = byId('retryBtn'); if (rb) rb.addEventListener('click', function () { state.idx = 0; state.answers = []; show('scrIntro'); });
  }
})();
</script>
</body>
</html>
